[build]
builder = "NIXPACKS"
buildCommand = "npm install && cd client && npm install && npm run build && cd ../api && npm install && npx prisma generate"

[deploy]
startCommand = "cd api && npx prisma migrate deploy && npx prisma db seed && node src/index.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3